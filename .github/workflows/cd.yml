name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - name: check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: deploy
        run: ./scripts/buildprod.sh

      - name: install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest && goose -version

      - name: update DB
        run: ./scripts/migrateup.sh

      - id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          # Use the Project NUMBER (440226356913) and include the PROVIDER name
          workload_identity_provider: "projects/440226356913/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "cloud-run-deployer@notely-492412.iam.gserviceaccount.com"

      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@v3"
        with:
          version: ">= 363.0.0"

      - name: "Use gcloud CLI"
        run: "gcloud info"

      - name: submit
        run: gcloud builds submit --tag europe-west4-docker.pkg.dev/notely-492412/notely-ar-repo/notely:latest .

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image europe-west4-docker.pkg.dev/notely-492412/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project notely-492412 --max-instances=4
